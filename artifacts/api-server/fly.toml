# fly.toml - Fly.io configuration for the Discord Ad Bot

app = "your-app-name"
primary_region = "iad"

[build]
  [build.args]
    NODE_VERSION = "20"

[processes]
  app = "node --enable-source-maps ./dist/index.js"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
